name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize]

jobs:
  test:
    name: Test
    timeout-minutes: 15
    runs-on: ubuntu-latest

    env:
      CI: true

    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - uses: actions/setup-go@v6
        with:
          go-version: "^1.26.0"
      - run: go version

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --verbose --timeout=3m

      - name: Test
        run: make test

      - name: Run docker tests
        run: make docker-test
